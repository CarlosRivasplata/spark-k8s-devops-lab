apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'spark-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - "datastream-bigdata"
---
apiVersion: v1
kind: Pod
metadata:
  name: prometheus-server
  namespace: monitoring
spec:
  containers:
  - name: prometheus
    image: prom/prometheus:latest
    args:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
    - containerPort: 9090
    volumeMounts:
      - name: config-volume
        mountPath: /etc/prometheus
  volumes:
    - name: config-volume
      configMap:
        name: prometheus-config