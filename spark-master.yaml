apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: datastream-bigdata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
    spec:
      # Esta línea es la clave para evitar que Kubernetes inyecte variables de servicio erróneas
      enableServiceLinks: false
      containers:
      - name: spark-master
        image: datastream/spark-worker:3.5.x-jdk17
        command: ["/opt/spark/bin/spark-class"]
        args: ["org.apache.spark.deploy.master.Master", "--host", "0.0.0.0"]
        ports:
        - containerPort: 7077
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: spark-master
  namespace: datastream-bigdata
spec:
  selector:
    app: spark-master
  ports:
    - name: spark-master
      protocol: TCP
      port: 7077
      targetPort: 7077
    - name: spark-ui
      protocol: TCP
      port: 8080
      targetPort: 8080