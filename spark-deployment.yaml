apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: datastream-bigdata
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
    spec:
      initContainers:
      - name: fix-permissions
        image: busybox
        command: ["sh", "-c", "mkdir -p /opt/spark/work && chmod -R 777 /opt/spark/work"]
        volumeMounts:
        - name: work-dir
          mountPath: /opt/spark/work
      containers:
      - name: spark-worker
        image: datastream/spark-worker:3.5.x-jdk17
        env:
        - name: SPARK_LOCAL_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: SPARK_PUBLIC_DNS
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        command: ["/opt/spark/bin/spark-class"]
        args: ["org.apache.spark.deploy.worker.Worker", "--webui-port", "8081", "spark://spark-master:7077"]
        volumeMounts:
        - name: work-dir
          mountPath: /opt/spark/work
        ports:
        - containerPort: 8081
      volumes:
      - name: work-dir
        emptyDir: {}